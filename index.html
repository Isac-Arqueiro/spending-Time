<!-- 🔐 SCRIPT ÚNICO (SEM DUPLICAÇÃO) -->
<script>

/* ===================================================
   🔐 SISTEMA DE PROTEÇÃO PWA - NÍVEL MÁXIMO FRONT-END
   =================================================== */

let deferredPrompt;
const btnInstall = document.getElementById("btnInstall");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block";
});

btnInstall.addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;
  deferredPrompt = null;
  btnInstall.style.display = "none";
});

function isRunningStandalone() {
  return window.matchMedia("(display-mode: standalone)").matches ||
         window.navigator.standalone === true;
}

document.addEventListener("DOMContentLoaded", () => {

  if (!isRunningStandalone()) {
    document.body.innerHTML = `
      <div style="text-align:center;padding:40px;font-family:sans-serif">
        <h2>📲 Instale o aplicativo para assistir aos canais</h2>
        <p>Após instalar, abra pelo ícone do app.</p>
      </div>
    `;
    return;
  }

  protegerLinks();
});

function protegerLinks() {
  const links = document.querySelectorAll(".channel-button");

  links.forEach(link => {
    const originalUrl = link.getAttribute("href").trim();
    const encoded = btoa(originalUrl);
    link.removeAttribute("href");

    link.addEventListener("click", function(e) {
      e.preventDefault();
      if (!isRunningStandalone()) return;
      const decoded = atob(encoded);
      window.open(decoded, "_blank");
    });
  });
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

</script>
